<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate Life Tracker</title>
<style>
:root {
  --bg-dark: #f7f8fb;
  --bg-panel: #ffffff;
  --bg-hover: #edf2f7;
  --text-main: #1f2937;
  --text-muted: #64748b;
  --accent-blue: #4f7ac7;
  --accent-green: #7fb77e;
  --accent-red: #ea7a6b;
  --border: #d1d5db;
  --shadow: 0 20px 60px rgba(15, 23, 42, 0.08);
  --font-family: system-ui, -apple-system, sans-serif;
}
:root[data-theme='dark'] {
  --bg-dark: #0f172a;
  --bg-panel: #1e293b;
  --bg-hover: #334155;
  --text-main: #f8fafc;
  --text-muted: #94a3b8;
  --accent-blue: #60a5fa;
  --accent-green: #34d399;
  --accent-red: #f87171;
  --border: #334155;
  --shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
}
:root[data-theme='dark'] body,
:root[data-theme='dark'] .main-content,
:root[data-theme='dark'] .sidebar,
:root[data-theme='dark'] .card,
:root[data-theme='dark'] .dashboard-detail,
:root[data-theme='dark'] .dashboard-detail-item,
:root[data-theme='dark'] .list-item,
:root[data-theme='dark'] input,
:root[data-theme='dark'] select,
:root[data-theme='dark'] .topbar,
:root[data-theme='dark'] .drawer-toggle,
:root[data-theme='dark'] .theme-toggle,
:root[data-theme='dark'] .key-btn,
:root[data-theme='dark'] #auth-screen,
:root[data-theme='dark'] .dashboard-detail h3,
:root[data-theme='dark'] .dashboard-detail p,
:root[data-theme='dark'] .dashboard-detail-item h4,
:root[data-theme='dark'] .dashboard-detail-item span,
:root[data-theme='dark'] .list-meta,
:root[data-theme='dark'] .pin-display,
:root[data-theme='dark'] .sidebar-header {
  color: var(--text-main);
}
* { box-sizing: border-box; }
body {
  margin: 0; padding: 0; font-family: var(--font-family);
  background-color: var(--bg-dark); color: var(--text-main);
  display: flex; height: 100vh; overflow: hidden;
  transition: background-color 0.35s ease, color 0.35s ease;
}
/* Auth Screens */
#auth-screen {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: var(--bg-dark); display: flex; flex-direction: column;
  justify-content: center; align-items: center; z-index: 100;
  animation: fadeInUp 0.45s ease;
}
.pin-display { font-size: 2.5rem; letter-spacing: 1rem; margin-bottom: 2rem; min-height: 3rem; color: var(--accent-blue); }
.keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
.key-btn { 
  background: var(--bg-panel); border: 1px solid var(--border); color: var(--text-main);
  font-size: 1.5rem; border-radius: 50%; cursor: pointer; width: 70px; height: 70px;
  transition: background 0.2s ease, transform 0.2s ease, border-color 0.2s ease;
}
.key-btn:hover { background: var(--bg-hover); transform: translateY(-2px); }
.key-btn:active { transform: scale(0.97); }


/* Main Layout */
#app-container { display: none; width: 100%; height: 100%; position: relative; }
.sidebar { 
  position: fixed; top: 0; left: 0; bottom: 0; width: 260px;
  background: var(--bg-panel); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; transform: translateX(-110%);
  transition: transform 0.3s ease, box-shadow 0.3s ease;
  z-index: 20;
  box-shadow: 0 30px 80px rgba(15, 23, 42, 0.08);
}
.sidebar.open { transform: translateX(0); }
.sidebar-header { padding: 25px 20px; font-size: 1.5rem; font-weight: 800; border-bottom: 1px solid var(--border); color: var(--accent-blue); letter-spacing: 0.5px;}
.nav-links { list-style: none; padding: 0; margin: 0; flex-grow: 1; overflow-y: auto; }
.nav-item { padding: 18px 20px; cursor: pointer; border-bottom: 1px solid var(--border); transition: background 0.2s; font-weight: 500;}
.nav-item:hover, .nav-item.active { background: var(--bg-hover); color: var(--accent-blue); border-left: 4px solid var(--accent-blue); padding-left: 16px;}
.sidebar-footer { padding: 20px; border-top: 1px solid var(--border); }
.btn { background: var(--accent-blue); color: #ffffff; border: none; padding: 12px 18px; border-radius: 6px; cursor: pointer; font-weight: 600; transition: opacity 0.2s ease, transform 0.2s ease, background-color 0.2s ease; }
.btn:hover { opacity: 0.95; transform: translateY(-1px); }
.btn:active { transform: scale(0.98); }
.btn-red { background: var(--accent-red); color: #ffffff; }

#sidebar-overlay {
  position: fixed; inset: 0; background: rgba(15, 23, 42, 0.35);
  opacity: 0; visibility: hidden; transition: opacity 0.2s ease;
  z-index: 15;
}
#sidebar-overlay.visible { opacity: 1; visibility: visible; }

.drawer-toggle {
  display: flex; align-items: center; justify-content: center;
  width: 44px; height: 44px; border-radius: 12px; border: none;
  background: var(--bg-panel); color: var(--text-main); box-shadow: 0 8px 20px rgba(15,23,42,0.08);
  cursor: pointer; transition: transform 0.2s ease, background 0.2s ease, color 0.2s ease;
}
.drawer-toggle:hover { transform: translateY(-1px); }

.theme-toggle {
  display: flex; align-items: center; justify-content: center;
  padding: 0 16px; height: 44px;
  border-radius: 12px;
  background: var(--bg-panel);
  color: var(--text-main);
  box-shadow: 0 8px 20px rgba(15,23,42,0.08);
  transition: transform 0.2s ease, background 0.2s ease, color 0.2s ease;
}
.theme-toggle:hover { transform: translateY(-1px); }
.theme-toggle:active { transform: scale(0.98); }

.topbar {
  display: flex; align-items: center; justify-content: flex-start;
  gap: 12px; margin-bottom: 22px;
}

.main-content { position: relative; flex-grow: 1; padding: 30px; overflow-y: auto; background: var(--bg-dark); margin-left: 0; }
.view-section { display: none; animation: fadeIn 0.3s ease-in-out; }
.view-section.active { display: block; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeInUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
@keyframes popIn { from { opacity: 0; transform: scale(0.97); } to { opacity: 1; transform: scale(1); } }

/* Typography & Layouts */
h2 { margin-top: 0; margin-bottom: 25px; font-size: 2rem; font-weight: 700; color: var(--text-main); }
.form-group { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
input, select { 
  flex-grow: 1; padding: 12px 15px; background: var(--bg-panel); 
  border: 1px solid var(--border); color: var(--text-main); border-radius: 6px; 
  font-size: 1rem; outline: none; transition: border-color 0.2s;
}
input:focus, select:focus { border-color: var(--accent-blue); }

/* Dashboard Cards */
.dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; }
.card { background: var(--bg-panel); padding: 25px; border-radius: 10px; border: 1px solid var(--border); box-shadow: 0 4px 6px rgba(0,0,0,0.1); animation: popIn 0.28s ease both; }
.dashboard-card { cursor: pointer; transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease; display: block; width: 100%; text-align: left; }
.dashboard-card:hover { transform: translateY(-2px); box-shadow: 0 10px 24px rgba(15,23,42,0.12); }
.dashboard-card.active { border-color: var(--accent-blue); box-shadow: 0 12px 28px rgba(79,122,199,0.16); }
.dashboard-detail { margin-top: 30px; padding: 22px; border-radius: 14px; background: var(--bg-panel); border: 1px solid var(--border); box-shadow: 0 4px 16px rgba(15,23,42,0.05); animation: fadeInUp 0.4s ease; }
.dashboard-detail h3 { margin-top: 0; margin-bottom: 16px; font-size: 1.2rem; color: var(--text-main); }
.dashboard-detail p { margin: 0; color: var(--text-muted); }
.dashboard-detail-list { display: grid; gap: 12px; margin-top: 16px; }
.dashboard-detail-item { padding: 16px; background: var(--bg-dark); border-radius: 10px; border: 1px solid var(--border); transition: transform 0.2s ease, box-shadow 0.2s ease; }
.dashboard-detail-item:hover { transform: translateY(-1px); box-shadow: 0 10px 20px rgba(15,23,42,0.08); }
.dashboard-detail-item h4 { margin: 0 0 8px 0; font-size: 1rem; color: var(--text-main); }
.dashboard-detail-item span { color: var(--text-muted); font-size: 0.92rem; }

/* Lists */
.list-container { margin-top: 25px; display: flex; flex-direction: column; gap: 12px; }
.list-item { 
  display: flex; justify-content: space-between; align-items: center; 
  padding: 18px 20px; background: var(--bg-panel); border: 1px solid var(--border); 
  border-radius: 8px; transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
  animation: fadeInUp 0.35s ease both;
}
.list-item:hover { transform: translateX(2px); border-color: #475569; box-shadow: 0 10px 24px rgba(15,23,42,0.07); }
.list-item-content { flex-grow: 1; }
.list-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 6px; }
.list-meta { font-size: 0.85rem; color: var(--text-muted); }
.list-item-actions { margin-left: 20px; display: flex; align-items: center; gap: 15px; }

/* Custom Checkbox */
input[type="checkbox"] { width: 22px; height: 22px; cursor: pointer; accent-color: var(--accent-blue); }

/* Habits */
.streak-circle { width: 28px; height: 28px; border-radius: 50%; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s; background: var(--bg-panel); }
.streak-circle.filled { background: var(--accent-green); border-color: var(--accent-green); color: #fff; }
.streak-circle.filled::after { content: '✓'; font-size: 14px; font-weight: bold; }

@media (max-width: 768px) {
  #app-container { flex-direction: column; }
  .sidebar { width: 100%; flex-direction: column; height: auto; border-right: none; border-bottom: 1px solid var(--border); }
  .nav-links { display: flex; overflow-x: auto; flex-wrap: nowrap; padding-bottom: 5px; }
  .nav-item { white-space: nowrap; border-bottom: none; border-left: none; }
  .nav-item:hover, .nav-item.active { border-left: none; border-bottom: 3px solid var(--accent-blue); padding-left: 20px; }
  .main-content { padding: 90px 15px 15px; }
  .form-group { flex-direction: column; }
}
</style>
</head>
<body>

<div id="auth-screen">
  <h2 id="auth-title">Enter Passcode</h2>
  <div class="pin-display" id="pin-display"></div>
  <div class="keypad" id="keypad">
    <button class="key-btn" onclick="handleKey('1')">1</button>
    <button class="key-btn" onclick="handleKey('2')">2</button>
    <button class="key-btn" onclick="handleKey('3')">3</button>
    <button class="key-btn" onclick="handleKey('4')">4</button>
    <button class="key-btn" onclick="handleKey('5')">5</button>
    <button class="key-btn" onclick="handleKey('6')">6</button>
    <button class="key-btn" onclick="handleKey('7')">7</button>
    <button class="key-btn" onclick="handleKey('8')">8</button>
    <button class="key-btn" onclick="handleKey('9')">9</button>
    <button class="key-btn" onclick="handleKey('C')" style="color: var(--accent-red)">C</button>
    <button class="key-btn" onclick="handleKey('0')">0</button>
    <button class="key-btn" onclick="handleKey('<')">⌫</button>
  </div>
  <p id="auth-msg" style="color: var(--accent-red); margin-top: 20px; font-weight: 500; height: 1.5rem;"></p>
</div>

<div id="app-container">
  <aside class="sidebar">
    <div class="sidebar-header">LifeTracker</div>
    <ul class="nav-links">
      <li class="nav-item active" onclick="switchView('dashboard')">Dashboard</li>
      <li class="nav-item" onclick="switchView('tasks')">Tasks & Study</li>
      <li class="nav-item" onclick="switchView('habits')">Habits</li>
      <li class="nav-item" onclick="switchView('health')">Fitness & Health</li>
      <li class="nav-item" onclick="switchView('expenses')">Expenses</li>
    </ul>
    <div class="sidebar-footer">
      <button class="btn btn-red" style="width: 100%;" onclick="lockApp()">Lock App</button>
    </div>
  </aside>
  <div id="sidebar-overlay" onclick="closeSidebar()"></div>
  <main class="main-content">
    <div class="topbar">
      <button class="drawer-toggle" onclick="toggleSidebar()" aria-label="Toggle sidebar">☰</button>
      <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()" aria-label="Switch to dark mode">🌙</button>
    </div>
    <section id="view-dashboard" class="view-section active">
      <h2>Dashboard</h2>
      <div class="dashboard-grid">
        <button type="button" class="card dashboard-card" onclick="showDashboardDetail('tasks')"><h3>Pending Tasks</h3><div class="value" id="dash-tasks">0</div></button>
        <button type="button" class="card dashboard-card" onclick="showDashboardDetail('habits')"><h3>Active Habits</h3><div class="value" id="dash-habits">0</div></button>
        <button type="button" class="card dashboard-card" onclick="showDashboardDetail('health')"><h3>Calories Today</h3><div class="value" id="dash-cals">0</div></button>
        <button type="button" class="card dashboard-card" onclick="showDashboardDetail('expenses')"><h3>Monthly Expenses</h3><div class="value" id="dash-expenses">$0</div></button>
      </div>
      <div id="dashboard-detail" class="dashboard-detail"></div>
    </section>

    <section id="view-tasks" class="view-section">
      <h2>Tasks & Study</h2>
      <form onsubmit="addTask(event)" class="form-group">
        <input type="text" id="task-title" placeholder="Task description..." required style="flex: 3;">
        <select id="task-cat" style="flex: 1;">
          <option value="DSA Prep">DSA Prep</option>
          <option value="HackerRank">HackerRank</option>
          <option value="General">General</option>
        </select>
        <button class="btn" type="submit">Add Task</button>
      </form>
      <div class="list-container" id="task-list"></div>
    </section>

    <section id="view-habits" class="view-section">
      <h2>Habits</h2>
      <form onsubmit="addHabit(event)" class="form-group">
        <input type="text" id="habit-title" placeholder="New habit to build..." required>
        <button class="btn" type="submit">Create Habit</button>
      </form>
      <div class="list-container" id="habit-list"></div>
    </section>

    <section id="view-health" class="view-section">
      <h2>Fitness & Health</h2>
      <div id="health-filter-note" class="list-meta" style="margin-bottom: 12px; color: var(--text-main);"></div>
      <form onsubmit="addHealth(event)" class="form-group">
        <select id="health-type" style="flex: 1;">
          <option value="calorie">Calories (kcal)</option>
          <option value="workout">Workout (mins)</option>
        </select>
        <input type="number" id="health-value" placeholder="Amount..." required style="flex: 1;">
        <input type="text" id="health-desc" placeholder="Description (e.g. Chicken breast)" style="flex: 2;">
        <button class="btn" type="submit">Log</button>
      </form>
      <div class="list-container" id="health-list"></div>
    </section>

    <section id="view-expenses" class="view-section">
      <h2>Expenses</h2>
      <form onsubmit="addExpense(event)" class="form-group">
        <input type="number" id="expense-amount" placeholder="Amount ($)..." step="0.01" required style="flex: 1;">
        <input type="text" id="expense-cat" placeholder="Category (e.g., Groceries)" required style="flex: 1.5;">
        <input type="text" id="expense-desc" placeholder="Note (Optional)" style="flex: 2;">
        <button class="btn" type="submit">Add Expense</button>
      </form>
      <div class="list-container" id="expense-list"></div>
    </section>
  </main>
</div>

<script>
let appState = {
  profile: { pinHash: null, isLoggedOut: true },
  tasks: [],
  habits: [],
  health: [],
  expenses: [],
  theme: 'light'
};

let currentPin = '';
let authMode = 'login'; // 'login' or 'setup'
let currentHealthFilter = null;
let activeDashboardDetail = 'tasks';
const STORAGE_KEY = 'ultimateLifeTracker_appState';

// --- Utilities ---
const generateId = () => crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(36) + Math.random().toString(36).substr(2);
const todayStr = () => new Date().toISOString().split('T')[0];

async function hashPIN(pin) {
  if (!window.crypto || !window.crypto.subtle) {
    // Fallback if not in secure context
    return btoa(pin + "salt123"); 
  }
  const encoder = new TextEncoder();
  const data = encoder.encode(pin);
  const hashBuffer = await crypto.subtle.digest('SHA-256', data);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
}

// --- Persistence & Auth Layer ---
function persistData() {
  if (!appState.profile || appState.profile.isLoggedOut) return;
  localStorage.setItem(STORAGE_KEY, JSON.stringify(appState));
}

function applyTheme(theme) {
  const root = document.documentElement;
  root.dataset.theme = theme;
  appState.theme = theme;
  const toggle = document.getElementById('theme-toggle');
  if (toggle) {
    if (theme === 'dark') {
      toggle.innerText = '☀️';
      toggle.setAttribute('aria-label', 'Switch to light mode');
    } else {
      toggle.innerText = '🌙';
      toggle.setAttribute('aria-label', 'Switch to dark mode');
    }
  }
}

function toggleTheme() {
  const nextTheme = appState.theme === 'dark' ? 'light' : 'dark';
  applyTheme(nextTheme);
  persistData();
}

function initAuth() {
  const savedData = localStorage.getItem(STORAGE_KEY);
  if (savedData) {
    const parsed = JSON.parse(savedData);
    if (parsed.theme) {
      appState.theme = parsed.theme;
    }
    if (parsed.profile && parsed.profile.pinHash) {
      authMode = 'login';
      document.getElementById('auth-title').innerText = 'Enter Passcode';
    } else {
      setupMode();
    }
  } else {
    setupMode();
  }

  applyTheme(appState.theme);
  document.getElementById('auth-screen').style.display = 'flex';
  document.getElementById('app-container').style.display = 'none';
  currentPin = '';
  updatePinDisplay();
}

function setupMode() {
  authMode = 'setup';
  document.getElementById('auth-title').innerText = 'Create 4-Digit Passcode';
}

async function handleKey(key) {
  const msgEl = document.getElementById('auth-msg');
  msgEl.innerText = '';

  if (key === 'C') { currentPin = ''; }
  else if (key === '<') { currentPin = currentPin.slice(0, -1); }
  else if (currentPin.length < 4) { currentPin += key; }
  
  updatePinDisplay();

  if (currentPin.length === 4) {
    const hashed = await hashPIN(currentPin);
    
    if (authMode === 'setup') {
      appState.profile = { pinHash: hashed, isLoggedOut: true };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(appState));
      authMode = 'login';
      currentPin = '';
      updatePinDisplay();
      document.getElementById('auth-title').innerText = 'Enter Passcode';
      msgEl.style.color = 'var(--accent-green)';
      msgEl.innerText = 'Passcode created! Please log in.';
      setTimeout(() => msgEl.innerText = '', 2000);
    } else {
      const savedData = localStorage.getItem(STORAGE_KEY);
      const parsed = savedData ? JSON.parse(savedData) : null;
      
      if (parsed && parsed.profile && parsed.profile.pinHash === hashed) {
        unlockApp(parsed);
      } else {
        msgEl.style.color = 'var(--accent-red)';
        msgEl.innerText = 'Incorrect Passcode';
        currentPin = '';
        updatePinDisplay();
      }
    }
  }
}

function updatePinDisplay() {
  document.getElementById('pin-display').innerText = '•'.repeat(currentPin.length);
}

function unlockApp(parsedState) {
  appState = parsedState;
  appState.profile.isLoggedOut = false;
  appState.theme = appState.theme || 'light';
  
  // Ensure models exist
  appState.tasks = appState.tasks || [];
  appState.habits = appState.habits || [];
  appState.health = appState.health || [];
  appState.expenses = appState.expenses || [];
  
  persistData(); // Save logged-in state

  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app-container').style.display = 'flex';
  applyTheme(appState.theme);
  
  renderAll();
}

function lockApp() {
  // Update state to logged out and save
  appState.profile.isLoggedOut = true;
  localStorage.setItem(STORAGE_KEY, JSON.stringify(appState));
  
  // Wipe in-memory arrays to prevent unauthorized access
  appState.tasks = [];
  appState.habits = [];
  appState.health = [];
  appState.expenses = [];
  
  initAuth();
}

// --- Navigation ---
function switchView(viewId, filterType = null) {
  document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  
  document.getElementById(`view-${viewId}`).classList.add('active');
  const navItems = document.querySelectorAll('.nav-item');
  navItems.forEach(item => {
    if (item.getAttribute('onclick').includes(viewId)) {
      item.classList.add('active');
    }
  });

  currentHealthFilter = filterType === 'calorie' || filterType === 'workout' ? filterType : null;
  if (viewId !== 'health') {
    currentHealthFilter = null;
  }

  if (viewId === 'health') {
    const note = filterType ? `Showing only ${filterType} entries` : '';
    document.getElementById('health-filter-note').innerText = note;
  }

  renderHealth();
  closeSidebar();
}

function showDashboardDetail(detailType) {
  activeDashboardDetail = detailType;
  renderDashboardDetails();
  updateDashboardCardState();
}

function updateDashboardCardState() {
  document.querySelectorAll('.dashboard-card').forEach(card => {
    card.classList.remove('active');
  });
  const cards = document.querySelectorAll('.dashboard-card');
  cards.forEach(card => {
    if (card.getAttribute('onclick').includes(`'${activeDashboardDetail}'`)) {
      card.classList.add('active');
    }
  });
}

function renderDashboardDetails() {
  const container = document.getElementById('dashboard-detail');
  let title = '';
  let content = '';

  if (activeDashboardDetail === 'tasks') {
    title = 'Pending Tasks';
    const pending = appState.tasks.filter(t => !t.completed);
    if (!pending.length) {
      content = '<p>No pending tasks yet. Add a new task to get started.</p>';
    } else {
      content = '<div class="dashboard-detail-list">' + pending.slice(0, 6).map(t => `
        <div class="dashboard-detail-item">
          <h4>${t.title}</h4>
          <span>${t.category} • ${t.date}</span>
        </div>`).join('') + '</div>';
    }
  } else if (activeDashboardDetail === 'habits') {
    title = 'Active Habits';
    const habits = appState.habits;
    if (!habits.length) {
      content = '<p>No habits set yet. Create one to track your streak.</p>';
    } else {
      content = '<div class="dashboard-detail-list">' + habits.slice(0, 6).map(h => `
        <div class="dashboard-detail-item">
          <h4>${h.title}</h4>
          <span>Streak: ${calculateStreak(h.log)} days</span>
        </div>`).join('') + '</div>';
    }
  } else if (activeDashboardDetail === 'health') {
    title = 'Calories Today';
    const today = todayStr();
    const calories = appState.health.filter(h => h.type === 'calorie' && h.timestamp.startsWith(today));
    if (!calories.length) {
      content = '<p>No calorie entries for today. Log your meals or snacks to keep track.</p>';
    } else {
      content = '<div class="dashboard-detail-list">' + calories.slice(0, 6).map(h => `
        <div class="dashboard-detail-item">
          <h4>${h.value} kcal</h4>
          <span>${h.description || 'No description'} • ${new Date(h.timestamp).toLocaleTimeString()}</span>
        </div>`).join('') + '</div>';
    }
  } else if (activeDashboardDetail === 'expenses') {
    title = 'Monthly Expenses';
    const currentMonth = todayStr().substring(0, 7);
    const finances = appState.expenses.filter(e => e.timestamp.startsWith(currentMonth));
    if (!finances.length) {
      content = '<p>No expenses recorded for this month yet.</p>';
    } else {
      content = '<div class="dashboard-detail-list">' + finances.slice(0, 6).map(e => `
        <div class="dashboard-detail-item">
          <h4>$${e.amount.toFixed(2)}</h4>
          <span>${e.category}${e.description ? ' • ' + e.description : ''} • ${new Date(e.timestamp).toLocaleDateString()}</span>
        </div>`).join('') + '</div>';
    }
  }

  container.innerHTML = `<h3>${title}</h3>${content}`;
}

function toggleSidebar() {
  const sidebar = document.querySelector('.sidebar');
  const overlay = document.getElementById('sidebar-overlay');
  const isOpen = sidebar.classList.contains('open');

  if (isOpen) {
    sidebar.classList.remove('open');
    overlay.classList.remove('visible');
  } else {
    sidebar.classList.add('open');
    overlay.classList.add('visible');
  }
}

function closeSidebar() {
  const sidebar = document.querySelector('.sidebar');
  const overlay = document.getElementById('sidebar-overlay');
  sidebar.classList.remove('open');
  overlay.classList.remove('visible');
}

function openSidebar() {
  const sidebar = document.querySelector('.sidebar');
  const overlay = document.getElementById('sidebar-overlay');
  sidebar.classList.add('open');
  overlay.classList.add('visible');
}

// --- Rendering Core ---
function renderAll() {
  renderTasks();
  renderHabits();
  renderHealth();
  renderExpenses();
  renderDashboard();
}

// --- Task Module ---
function addTask(e) {
  e.preventDefault();
  const title = document.getElementById('task-title').value;
  const category = document.getElementById('task-cat').value;
  appState.tasks.push({ id: generateId(), title, category, completed: false, date: todayStr() });
  e.target.reset();
  persistData();
  renderTasks();
  renderDashboard();
}

function toggleTask(id) {
  const t = appState.tasks.find(x => x.id === id);
  if (t) { t.completed = !t.completed; persistData(); renderTasks(); renderDashboard(); }
}

function deleteTask(id) {
  appState.tasks = appState.tasks.filter(x => x.id !== id);
  persistData(); renderTasks(); renderDashboard();
}

function renderTasks() {
  const container = document.getElementById('task-list');
  container.innerHTML = '';
  // Sort: pending first, then by date desc
  const sorted = [...appState.tasks].sort((a, b) => {
    if (a.completed === b.completed) return new Date(b.date) - new Date(a.date);
    return a.completed ? 1 : -1;
  });

  sorted.forEach(t => {
    const div = document.createElement('div');
    div.className = 'list-item';
    div.innerHTML = `
      <div class="list-item-content" style="opacity: ${t.completed ? '0.5' : '1'}">
        <div class="list-title" style="text-decoration: ${t.completed ? 'line-through' : 'none'}">${t.title}</div>
        <div class="list-meta"><span style="color:var(--accent-blue)">${t.category}</span> • ${t.date}</div>
      </div>
      <div class="list-item-actions">
        <input type="checkbox" ${t.completed ? 'checked' : ''} onchange="toggleTask('${t.id}')">
        <button class="btn btn-red" onclick="deleteTask('${t.id}')" style="padding: 6px 12px; font-size: 0.8rem;">Delete</button>
      </div>
    `;
    container.appendChild(div);
  });
}

// --- Habit Module ---
function addHabit(e) {
  e.preventDefault();
  const title = document.getElementById('habit-title').value;
  appState.habits.push({ id: generateId(), title, streak: 0, completedToday: false, log: [] });
  e.target.reset();
  persistData(); renderHabits(); renderDashboard();
}

function toggleHabit(id) {
  const h = appState.habits.find(x => x.id === id);
  if (!h) return;
  const today = todayStr();
  const todayIdx = h.log.indexOf(today);
  
  if (todayIdx > -1) {
    h.log.splice(todayIdx, 1);
  } else {
    h.log.push(today);
  }
  
  persistData(); renderHabits();
}

function deleteHabit(id) {
  appState.habits = appState.habits.filter(x => x.id !== id);
  persistData(); renderHabits(); renderDashboard();
}

function calculateStreak(log) {
  if (!log.length) return 0;
  const sorted = [...log].sort().reverse();
  let streak = 0;
  let currentDate = new Date();
  
  const checkDay = (d) => d.toISOString().split('T')[0];
  
  if (sorted[0] === checkDay(currentDate)) {
    streak++;
    currentDate.setDate(currentDate.getDate() - 1);
  } else {
    const yesterday = new Date();
    yesterday.setDate(yesterday.getDate() - 1);
    if (sorted[0] === checkDay(yesterday)) {
      currentDate = yesterday;
    } else {
      return 0;
    }
  }

  for (let i = streak; i < sorted.length; i++) {
    if (sorted[i] === checkDay(currentDate)) {
      streak++;
      currentDate.setDate(currentDate.getDate() - 1);
    } else {
      break;
    }
  }
  return streak;
}

function renderHabits() {
  const container = document.getElementById('habit-list');
  container.innerHTML = '';
  const today = todayStr();

  appState.habits.forEach(h => {
    h.completedToday = h.log.includes(today);
    h.streak = calculateStreak(h.log);

    const div = document.createElement('div');
    div.className = 'list-item';
    div.innerHTML = `
      <div class="list-item-content">
        <div class="list-title">${h.title}</div>
        <div class="list-meta" style="color:var(--accent-green)">🔥 Streak: ${h.streak} days</div>
      </div>
      <div class="list-item-actions">
        <div class="streak-circle ${h.completedToday ? 'filled' : ''}" onclick="toggleHabit('${h.id}')" title="Check-in today"></div>
        <button class="btn btn-red" onclick="deleteHabit('${h.id}')" style="padding: 6px 12px; font-size: 0.8rem; margin-left: 10px;">Delete</button>
      </div>
    `;
    container.appendChild(div);
  });
}

// --- Health Module ---
function addHealth(e) {
  e.preventDefault();
  const type = document.getElementById('health-type').value;
  const value = parseFloat(document.getElementById('health-value').value);
  const description = document.getElementById('health-desc').value;
  appState.health.push({ id: generateId(), type, value, description, timestamp: new Date().toISOString() });
  e.target.reset();
  persistData(); renderHealth(); renderDashboard();
}

function deleteHealth(id) {
  appState.health = appState.health.filter(x => x.id !== id);
  persistData(); renderHealth(); renderDashboard();
}

function renderHealth() {
  const container = document.getElementById('health-list');
  container.innerHTML = '';
  const sorted = [...appState.health].sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));
  const filtered = currentHealthFilter ? sorted.filter(h => h.type === currentHealthFilter) : sorted;

  filtered.forEach(h => {
    const isCal = h.type === 'calorie';
    const div = document.createElement('div');
    div.className = 'list-item';
    div.innerHTML = `
      <div class="list-item-content">
        <div class="list-title" style="color: ${isCal ? 'var(--accent-blue)' : 'var(--accent-green)'}">
          ${isCal ? 'Calories' : 'Workout'}: ${h.value} ${isCal ? 'kcal' : 'mins'}
        </div>
        <div class="list-meta">${h.description ? h.description + ' • ' : ''}${new Date(h.timestamp).toLocaleString()}</div>
      </div>
      <div class="list-item-actions">
        <button class="btn btn-red" onclick="deleteHealth('${h.id}')" style="padding: 6px 12px; font-size: 0.8rem;">Delete</button>
      </div>
    `;
    container.appendChild(div);
  });
}

// --- Expense Module ---
function addExpense(e) {
  e.preventDefault();
  const amount = parseFloat(document.getElementById('expense-amount').value);
  const category = document.getElementById('expense-cat').value;
  const description = document.getElementById('expense-desc').value;
  appState.expenses.push({ id: generateId(), amount, category, description, timestamp: new Date().toISOString() });
  e.target.reset();
  persistData(); renderExpenses(); renderDashboard();
}

function deleteExpense(id) {
  appState.expenses = appState.expenses.filter(x => x.id !== id);
  persistData(); renderExpenses(); renderDashboard();
}

function renderExpenses() {
  const container = document.getElementById('expense-list');
  container.innerHTML = '';
  const sorted = [...appState.expenses].sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));
  sorted.forEach(ex => {
    const div = document.createElement('div');
    div.className = 'list-item';
    div.innerHTML = `
      <div class="list-item-content">
        <div class="list-title" style="color: var(--accent-red)">$${ex.amount.toFixed(2)}</div>
        <div class="list-meta"><span style="color: var(--text-main);">${ex.category}</span> ${ex.description ? ' • ' + ex.description : ''} • ${new Date(ex.timestamp).toLocaleString()}</div>
      </div>
      <div class="list-item-actions">
        <button class="btn btn-red" onclick="deleteExpense('${ex.id}')" style="padding: 6px 12px; font-size: 0.8rem;">Delete</button>
      </div>
    `;
    container.appendChild(div);
  });
}

// --- Dashboard Module ---
function renderDashboard() {
  const pendingTasks = appState.tasks.filter(t => !t.completed).length;
  document.getElementById('dash-tasks').innerText = pendingTasks;
  
  document.getElementById('dash-habits').innerText = appState.habits.length;
  
  const today = todayStr();
  const todayCals = appState.health
    .filter(h => h.type === 'calorie' && h.timestamp.startsWith(today))
    .reduce((sum, h) => sum + h.value, 0);
  document.getElementById('dash-cals').innerText = todayCals;
  
  const currentMonth = today.substring(0, 7); // YYYY-MM
  const monthExpenses = appState.expenses
    .filter(e => e.timestamp.startsWith(currentMonth))
    .reduce((sum, e) => sum + e.amount, 0);
  document.getElementById('dash-expenses').innerText = '$' + monthExpenses.toFixed(2);

  renderDashboardDetails();
  updateDashboardCardState();
}
